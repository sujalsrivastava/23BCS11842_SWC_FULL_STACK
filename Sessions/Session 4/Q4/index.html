<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top px-4 bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo" width="100" height="40" class="me-4">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2">
                    <li class="nav-item"><a class="nav-link active fw-semibold" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">TV Shows</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Movies</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">New & Popular</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">My List</a></li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2 bg-dark text-white border-secondary search-box" type="search" placeholder="Titles, people, genres" aria-label="Search">
                    <button class="btn btn-outline-light" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <header class="hero-banner d-flex align-items-center">
        <div class="hero-overlay"></div>
        <div class="container-fluid px-5 hero-content">
            <h1 class="display-1 fw-bold text-white mb-3 hero-title">STRANGER<br>THINGS</h1>
            <p class="lead text-white col-md-6 col-lg-4 mb-4 hero-description">
                When a young boy vanishes, a small town uncovers a mystery involving secret experiments, terrifying supernatural forces and one strange little girl.
            </p>
            <div class="d-flex gap-3">
                <button class="btn btn-light btn-lg px-5 py-2 fw-bold d-flex align-items-center gap-2">▶ Play</button>
                <button class="btn btn-secondary btn-lg px-4 py-2 fw-bold text-white bg-opacity-50 d-flex align-items-center gap-2">ⓘ More Info</button>
            </div>
        </div>
    </header>

    <main class="content-rows pb-5">
        
        <div class="category-row mb-4">
            <h5 class="row-title text-white px-5 mb-2 fw-semibold">Trending Now</h5>
            <div class="movie-slider">
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://picsum.photos/400/225?random=1" alt="Movie"></div>
            </div>
        </div>

        <div class="category-row mb-4">
            <h5 class="row-title text-white px-5 mb-2 fw-semibold">Popular on Netflix</h5>
            <div class="movie-slider">
                <img class="movie-card" src="https://picsum.photos/400/225?random=1" alt="Movie">
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
                <div class="movie-card"><img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=400&h=225&fit=crop" alt="Movie"></div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
