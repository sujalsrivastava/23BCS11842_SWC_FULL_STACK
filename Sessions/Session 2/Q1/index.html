<!DOCTYPE html>
<html>
<head>
    <title>Tab Navigation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tab-container">
    <button class="tab active" onclick="openTab('overview', this)">
        Overview
    </button>

    <button class="tab" onclick="openTab('details', this)">
        Details
    </button>

    <button class="tab" onclick="openTab('settings', this)">
        Settings
    </button>
</div>

<div id="overview" class="content active-content">
    <h2>Overview</h2>
    <p>Overview content goes here.</p>
</div>

<div id="details" class="content">
    <h2>Details</h2>
    <p>Details content goes here.</p>
</div>

<div id="settings" class="content">
    <h2>Settings</h2>
    <p>Settings content goes here.</p>
</div>

<script src="script.js"></script>
</body>
</html>
