<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- KPI Cards -->
    <div class="kpi-grid">
        <div class="card">
            <h3>Total Sales</h3>
            <p>$45,000</p>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <p>1,250</p>
        </div>

        <div class="card">
            <h3>Customers</h3>
            <p>850</p>
        </div>

        <div class="card">
            <h3>Revenue Growth</h3>
            <p>18%</p>
        </div>
    </div>

    <!-- Analytics Section -->
    <div class="content-grid">

        <div class="card">
            <h3>Monthly Performance</h3>
            <p>Chart Placeholder</p>
        </div>

        <div class="card">
            <h3>Traffic Sources</h3>
            <p>Chart Placeholder</p>
        </div>

    </div>

    <!-- Data Table -->
    <div class="table-card">
        <h3>Recent Transactions</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>101</td>
                    <td>John</td>
                    <td>$250</td>
                    <td>Completed</td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Sarah</td>
                    <td>$180</td>
                    <td>Pending</td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>Mike</td>
                    <td>$420</td>
                    <td>Completed</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
